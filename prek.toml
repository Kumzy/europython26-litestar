# prek.toml — Git hook configuration (https://prek.j178.dev)
# prek is a fast, single-binary, drop-in replacement for pre-commit.
#
#   uv tool install prek      # install the runner once (global)
#   prek install              # wire up the git pre-commit hook
#   prek run --all-files      # run every hook across the whole repo
#
# Hooks: oxlint (lint Vue/TS) + oxfmt (format) + lightweight file hygiene
# + examples (ruff + pyright + pytest for the verified Python slide snippets).

[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v6.0.0"
hooks = [
  # Keep markdown hard line-breaks (two trailing spaces) intact for slides.
  { id = "trailing-whitespace", args = ["--markdown-linebreak-ext=md"] },
  { id = "end-of-file-fixer" },
  { id = "check-yaml" },
  { id = "check-json" },
  { id = "check-merge-conflict" },
]

[[repos]]
repo = "local"

[[repos.hooks]]
id = "oxlint"
name = "oxlint"
language = "system"
entry = "node_modules/.bin/oxlint --fix"
files = "\\.([cm]?[jt]sx?|vue)$"

[[repos.hooks]]
id = "oxfmt"
name = "oxfmt"
language = "system"
entry = "node_modules/.bin/oxfmt"
files = "\\.([cm]?[jt]sx?|vue|jsonc?|css|scss|less|md|markdown|ya?ml)$"
# Skip the Slidev manifest, lockfiles, and shared Flow docs (see .oxfmtrc.json).
exclude = "^(slides\\.md|package-lock\\.json|skills-lock\\.json)$|^\\.agents/"

# Verified Python slide snippets (sources in examples/, uv project at repo root).
# Runs the full gate when any example source or the project config changes; needs
# `uv` on PATH. Slide rendering of these files is verified by `npm run build`.
[[repos.hooks]]
id = "examples"
name = "litestar examples — ruff + pyright + pytest"
language = "system"
entry = "bash -c 'uv run ruff check examples && uv run ruff format --check examples && uv run pyright && uv run pytest'"
files = "^(pyproject\\.toml|uv\\.lock|examples/.*\\.py)$"
pass_filenames = false
